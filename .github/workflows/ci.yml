name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "."
          severity: error

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n on all scripts
        run: |
          set -e
          find . -name '*.sh' -print0 | while IFS= read -r -d '' f; do
            echo "Checking $f"
            bash -n "$f"
          done
